# Source: https://github.com/alacritty/alacritty/issues/474#issuecomment-338803299

[keyboard]
bindings = [
  { key = "Left", mods = "Alt", chars = "\u001bb" }, # Move word left
  { key = "Right", mods = "Alt", chars = "\u001bf" }, # Move word right
  { key = "Left", mods = "Command", chars = "\u001bOH" }, # Home
  { key = "Right", mods = "Command", chars = "\u001bOF" }, # End
  { key = "Back", mods = "Alt", chars = "\u001b\u007f" }, # Delete word
  { key = "Back", mods = "Command", chars = "\u0015" }, # Delete line
  { key = "N", mods = "Command", action = "CreateNewWindow" } # Create new alacritty window
]
